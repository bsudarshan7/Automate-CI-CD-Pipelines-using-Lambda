version: 0.2

phases:
  install:
    runtime-versions:
      python: 3.13
    commands:
      - echo "Installing dependencies..."

  pre_build:
    commands:
      - echo "Validating Python syntax..."

  build:
    commands:
      - python -m py_compile lambda_function.py
      - echo "Build successful."

  post_build:
    commands:
      - echo "Preparing deployment artifact..."

artifacts:
  files:
    - lambda_function.py
